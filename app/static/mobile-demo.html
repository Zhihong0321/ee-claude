<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e17">
<title>EE Finance Agent - Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #151a24;
  --bg-elevated: #1a1f2e;
  --text-primary: #e8eaed;
  --text-secondary: #9ca3af;
  --accent-primary: #00d4ff;
  --accent-glow: rgba(0, 212, 255, 0.15);
  --font-sans: 'Sora', sans-serif;
  --safe-area-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font-sans); background: var(--bg-primary); color: var(--text-primary); overflow: hidden; }
.app { display: flex; flex-direction: column; height: 100vh; }
.header { padding: 16px 20px; background: var(--bg-elevated); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 12px; }
.menu-btn { width: 40px; height: 40px; border-radius: 12px; background: transparent; border: none; color: var(--text-secondary); cursor: pointer; }
.header-title { font-size: 18px; font-weight: 600; }
.messages { flex: 1; overflow-y: auto; padding: 20px 16px 90px; display: flex; flex-direction: column; gap: 16px; }
.message { max-width: 85%; padding: 12px 16px; font-size: 15px; line-height: 1.5; border-radius: 18px; }
.message.user { align-self: flex-end; background: linear-gradient(135deg, var(--accent-primary), #00b8e6); color: #000; border-radius: 18px 18px 4px 18px; }
.message.assistant { align-self: flex-start; background: var(--bg-elevated); border-radius: 18px 18px 18px 4px; border-left: 3px solid var(--accent-primary); }
.composer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(26,31,46,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); padding: 12px 16px; z-index: 100; }
.composer-inner { display: flex; gap: 8px; align-items: flex-end; background: var(--bg-secondary); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 8px 12px; }
.composer textarea { flex: 1; border: none; background: transparent; color: var(--text-primary); font-family: var(--font-sans); font-size: 16px; resize: none; outline: none; max-height: 120px; }
.send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--accent-primary); color: #000; border: none; font-size: 20px; cursor: pointer; }
.drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 199; }
.drawer-overlay.open { opacity: 1; pointer-events: auto; }
.drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 85vw; max-width: 320px; background: var(--bg-elevated); transform: translateX(-100%); transition: transform 0.3s; z-index: 200; overflow-y: auto; }
.drawer.open { transform: translateX(0); }
.drawer-header { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.drawer-logo { width: 120px; margin-bottom: 16px; }
.drawer-title { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
.new-chat-btn { width: 100%; padding: 12px; background: var(--accent-primary); color: #000; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
.session-item { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
.session-item.active { background: var(--accent-glow); border-left: 3px solid var(--accent-primary); }
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; }
.empty-icon { font-size: 48px; margin-bottom: 24px; }
.empty-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.empty-subtitle { font-size: 14px; color: var(--text-secondary); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="menu-btn" id="menuBtn">☰</button>
    <h1 class="header-title">Finance Agent</h1>
  </div>
  <div class="messages" id="messages">
    <div class="empty-state">
      <div class="empty-icon">💼</div>
      <h2 class="empty-title">Welcome to EE Finance Agent</h2>
      <p class="empty-subtitle">Your AI-powered finance assistant</p>
    </div>
  </div>
  <div class="composer">
    <div class="composer-inner">
      <textarea id="messageInput" rows="1" placeholder="Ask me anything..."></textarea>
      <button class="send-btn" id="sendBtn">▶</button>
    </div>
  </div>
</div>
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <img src="/logo-02-cropped.png" alt="Logo" class="drawer-logo">
    <h2 class="drawer-title">Conversations</h2>
    <button class="new-chat-btn">+ New Chat</button>
  </div>
  <div class="session-item active">💬 June Commission Report</div>
  <div class="session-item">📊 Invoice Analysis</div>
  <div class="session-item">🔧 Build Commission Rule</div>
</div>
<script>
const textarea = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const messages = document.getElementById('messages');
const menuBtn = document.getElementById('menuBtn');
const drawer = document.getElementById('drawer');
const drawerOverlay = document.getElementById('drawerOverlay');

textarea.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

menuBtn.addEventListener('click', () => {
  drawer.classList.add('open');
  drawerOverlay.classList.add('open');
});

drawerOverlay.addEventListener('click', () => {
  drawer.classList.remove('open');
  drawerOverlay.classList.remove('open');
});

sendBtn.addEventListener('click', () => {
  const text = textarea.value.trim();
  if (!text) return;
  const emptyState = messages.querySelector('.empty-state');
  if (emptyState) emptyState.remove();
  const userMsg = document.createElement('div');
  userMsg.className = 'message user';
  userMsg.textContent = text;
  messages.appendChild(userMsg);
  textarea.value = '';
  textarea.style.height = 'auto';
  messages.scrollTop = messages.scrollHeight;
  setTimeout(() => {
    const aiMsg = document.createElement('div');
    aiMsg.className = 'message assistant';
    aiMsg.textContent = 'This is a demo of the mobile interface. In the real app, I would provide detailed financial analysis and commission calculations.';
    messages.appendChild(aiMsg);
    messages.scrollTop = messages.scrollHeight;
  }, 1000);
});

textarea.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendBtn.click();
  }
});
</script>
</body>
</html>
